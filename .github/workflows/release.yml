name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  validate:
    name: Validate / ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: gcc
          - os: macos-latest
            compiler: clang
          - os: windows-2022
            compiler: msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ clang libgtest-dev libgmock-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja googletest

      - name: Set up compiler (GCC)
        if: matrix.compiler == 'gcc'
        run: |
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV

      - name: Set up compiler (Clang - macOS)
        if: matrix.compiler == 'clang'
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      - name: Set up compiler (MSVC)
        if: matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Verify version consistency
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          VCPKG_VERSION=$(jq -r '.["version-semver"] // .version' vcpkg.json)

          echo "Tag version:     $TAG_VERSION"
          echo "VERSION file:    $FILE_VERSION"
          echo "vcpkg version:   $VCPKG_VERSION"

          if [[ "$TAG_VERSION" != "$FILE_VERSION" ]]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          if [[ "$TAG_VERSION" != "$VCPKG_VERSION" ]]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match vcpkg.json ($VCPKG_VERSION)"
            exit 1
          fi
          echo "Version consistency check passed: $TAG_VERSION"

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCOMMON_BUILD_TESTS=ON \
            -DCOMMON_BUILD_EXAMPLES=ON \
            -DCOMMON_HEADER_ONLY=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCOMMON_BUILD_TESTS=ON `
            -DCOMMON_BUILD_EXAMPLES=ON `
            -DCOMMON_HEADER_ONLY=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build
          ctest -C Release --output-on-failure --verbose

  publish:
    name: Publish Release
    needs: validate
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Find previous tag
        id: previous_tag
        shell: bash
        run: |
          previous_tag=$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)
          echo "tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from conventional commits
        id: changelog
        if: steps.previous_tag.outputs.tag != ''
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          fromTag: ${{ github.ref_name }}
          toTag: ${{ steps.previous_tag.outputs.tag }}
          writeToFile: false
          useGitmojis: false

      - name: Build release notes
        shell: bash
        env:
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.tag }}
          CHANGELOG: ${{ steps.changelog.outputs.changes }}
        run: |
          cat <<EOF > RELEASE_NOTES.md
          ## common_system ${GITHUB_REF_NAME}

          Foundation library for the unified_system ecosystem.

          ### Installation

          **vcpkg overlay port** — reference this tag in your overlay:
          ```
          "version": "${{ steps.version.outputs.version }}"
          ```

          **CMake FetchContent** — pin to this release:
          ```cmake
          FetchContent_Declare(
            common_system
            GIT_REPOSITORY https://github.com/kcenon/common_system.git
            GIT_TAG        ${GITHUB_REF_NAME}
          )
          ```
          EOF

          {
            echo
            echo "## Changelog"
            echo
            if [[ -n "$PREVIOUS_TAG" ]]; then
              printf '%s\n' "$CHANGELOG"
            else
              echo "Initial release."
            fi
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "common_system ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

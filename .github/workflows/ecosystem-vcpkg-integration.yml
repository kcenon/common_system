name: Ecosystem vcpkg Integration

on:
  pull_request:
    branches: [main]
    paths:
      - 'vcpkg-ports/**'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - 'tests/ecosystem-consumer/**'
      - '.github/workflows/ecosystem-vcpkg-integration.yml'
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  VCPKG_BINARY_SOURCES: "clear;default,readwrite"

jobs:
  # ─── Layer 0: common_system (base, no kcenon deps) ─────────────────────────
  layer-0-common-system:
    name: "Layer 0: common_system / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            triplet: x64-linux
          - os: macos-14
            triplet: arm64-osx

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup vcpkg
        uses: kcenon/common_system/.github/actions/setup-vcpkg@main
        with:
          manifest-dir: tests/ecosystem-consumer/common-system
          extra-cache-key: 'ecosystem-layer0'

      - name: Install GCC 13 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Copy shared registry config
        run: cp tests/ecosystem-consumer/vcpkg-configuration.json tests/ecosystem-consumer/common-system/vcpkg-configuration.json

      - name: Configure and build consumer
        run: |
          cmake -B build/layer0 \
            -S tests/ecosystem-consumer/common-system \
            -DCMAKE_TOOLCHAIN_FILE="$CMAKE_TOOLCHAIN_FILE" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DCMAKE_BUILD_TYPE=Release 2>&1 || {
            echo "::error::Layer 0 (common_system): CMake configure failed"
            exit 1
          }
          cmake --build build/layer0 --config Release 2>&1 || {
            echo "::error::Layer 0 (common_system): build failed"
            exit 1
          }

      - name: Run consumer binary
        run: |
          if [ -f build/layer0/test_common_system ]; then
            ./build/layer0/test_common_system
          else
            ./build/layer0/Release/test_common_system
          fi || {
            echo "::error::Layer 0 (common_system): consumer binary failed"
            exit 1
          }

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ecosystem-layer0-${{ matrix.os }}-logs
          path: |
            build/layer0/**/*.log
            build/layer0/vcpkg_installed/vcpkg/issue_body.md
          retention-days: 7

  # ─── Layer 1: thread_system (depends on common_system) ─────────────────────

name: Doxygen Documentation

on:
  workflow_call:
    inputs:
      checkout-submodules:
        description: 'Submodule checkout mode: false, true, or recursive'
        required: false
        type: string
        default: 'false'
      checkout-common-system:
        description: 'Explicitly checkout kcenon/common_system as a dependency'
        required: false
        type: boolean
        default: false
      publish-dir:
        description: 'Path to generated HTML output'
        required: false
        type: string
        default: './documents/html'

jobs:
  generate-and-deploy:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: ${{ inputs.checkout-submodules }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout common_system dependency
        if: ${{ inputs.checkout-common-system }}
        uses: actions/checkout@v5
        with:
          repository: kcenon/common_system
          path: common_system
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Doxygen and Graphviz
        env:
          DOXYGEN_VERSION: '1.12.0'
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          DOXYGEN_DEB="doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          DOXYGEN_URL="https://github.com/doxygen/doxygen/releases/download/Release_${DOXYGEN_VERSION//./_}/${DOXYGEN_DEB}"
          echo "Downloading Doxygen ${DOXYGEN_VERSION} from ${DOXYGEN_URL}"
          if curl -fSL -o doxygen.tar.gz "${DOXYGEN_URL}"; then
            mkdir -p doxygen-bin
            tar xzf doxygen.tar.gz -C doxygen-bin --strip-components=1
            sudo install -m 755 doxygen-bin/bin/doxygen /usr/local/bin/doxygen
            rm -rf doxygen.tar.gz doxygen-bin
          else
            echo "::warning::Failed to download Doxygen ${DOXYGEN_VERSION}; falling back to apt-get"
            sudo apt-get install -y doxygen
          fi
          doxygen --version

      - name: Generate documentation
        run: doxygen Doxyfile

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ inputs.publish-dir }}
          force_orphan: true
          enable_jekyll: false
          commit_message: 'docs(gh-pages): update API documentation [skip ci]'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

name: SOUP Version Drift Check

on:
  push:
    branches: [ main, phase-* ]
    paths:
      - 'VERSION'
      - 'vcpkg.json'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'DEPENDENCY_MATRIX.md'
  pull_request:
    branches: [ main ]
    paths:
      - 'VERSION'
      - 'vcpkg.json'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'DEPENDENCY_MATRIX.md'
  workflow_dispatch:

jobs:
  version-drift:
    name: SOUP Version Drift Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Run version drift check
      run: |
        python3 scripts/check_version_drift.py \
          --no-color \
          --verbose

    - name: Run matrix consistency check
      if: always()
      run: |
        python3 scripts/check_version_drift.py \
          --no-color \
          --verbose \
          --matrix DEPENDENCY_MATRIX.md

# Reusable Release Workflow Template
#
# This workflow can be called from other ecosystem repositories to standardize
# the release process. It validates version consistency, builds, tests, and
# publishes a GitHub Release with auto-generated changelog.
#
# Usage in another repository:
#
#   name: Release
#   on:
#     push:
#       tags: ['v[0-9]+.[0-9]+.[0-9]+']
#   jobs:
#     release:
#       uses: kcenon/common_system/.github/workflows/release-template.yml@main
#       with:
#         project-name: thread_system
#         cmake-configure-options: >-
#           -DTHREAD_BUILD_TESTS=ON
#       permissions:
#         contents: write
#
# See: VERSIONING.md for the ecosystem versioning policy

name: Reusable Release

on:
  workflow_call:
    inputs:
      project-name:
        description: 'Name of the project (used in CMakeLists.txt project() call)'
        required: true
        type: string
      cmake-build-type:
        description: 'CMake build type'
        required: false
        type: string
        default: 'Release'
      build-tests:
        description: 'Whether to build and run tests during validation'
        required: false
        type: boolean
        default: true
      vcpkg-enabled:
        description: 'Whether to use vcpkg for dependency management'
        required: false
        type: boolean
        default: true
      cmake-configure-options:
        description: 'Additional CMake configure options (e.g., -DFOO_BUILD_TESTS=ON)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  validate:
    name: Validate / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-latest
          - os: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version consistency
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CMAKE_VERSION=$(grep -m1 "project(${{ inputs.project-name }}" CMakeLists.txt | \
            sed -E 's/.*VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          VCPKG_VERSION=$(grep '"version"' vcpkg.json | head -1 | \
            sed -E 's/.*"version": "([^"]+)".*/\1/')

          echo "Tag version:    $TAG_VERSION"
          echo "CMake version:  $CMAKE_VERSION"
          echo "vcpkg version:  $VCPKG_VERSION"

          if [[ "$TAG_VERSION" != "$CMAKE_VERSION" ]]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match CMakeLists.txt ($CMAKE_VERSION)"
            exit 1
          fi
          if [[ "$TAG_VERSION" != "$VCPKG_VERSION" ]]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match vcpkg.json ($VCPKG_VERSION)"
            exit 1
          fi
          echo "Version consistency check passed: $TAG_VERSION"

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up vcpkg
        if: inputs.vcpkg-enabled
        uses: lukka/run-vcpkg@v11

      - name: Configure CMake
        shell: bash
        run: |
          cmake_args=(-B build -G Ninja)
          cmake_args+=(-DCMAKE_BUILD_TYPE=${{ inputs.cmake-build-type }})
          if [[ "${{ inputs.vcpkg-enabled }}" == "true" ]]; then
            cmake_args+=(-DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake")
          fi
          cmake "${cmake_args[@]}" ${{ inputs.cmake-configure-options }}

      - name: Build
        shell: bash
        run: cmake --build build --config ${{ inputs.cmake-build-type }}

      - name: Test
        if: inputs.build-tests
        shell: bash
        run: |
          cd build
          ctest -C ${{ inputs.cmake-build-type }} --output-on-failure

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-validate-${{ matrix.os }}-logs
          path: |
            build/CMakeFiles/*.log
            build/Testing/Temporary/

  publish:
    name: Publish Release
    needs: validate
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Find previous tag
        id: previous_tag
        shell: bash
        run: |
          previous_tag=$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)
          echo "tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from conventional commits
        id: changelog
        if: steps.previous_tag.outputs.tag != ''
        uses: requarks/changelog-action@v1
        with:
          token: ${{ github.token }}
          fromTag: ${{ github.ref_name }}
          toTag: ${{ steps.previous_tag.outputs.tag }}
          writeToFile: false
          useGitmojis: false

      - name: Build release notes
        shell: bash
        env:
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.tag }}
          CHANGELOG: ${{ steps.changelog.outputs.changes }}
          PROJECT_NAME: ${{ inputs.project-name }}
        run: |
          cat <<EOF > RELEASE_NOTES.md
          ## ${PROJECT_NAME} ${GITHUB_REF_NAME}

          ### Installation

          **CMake FetchContent** — pin to this release:
          \`\`\`cmake
          FetchContent_Declare(
            ${PROJECT_NAME}
            GIT_REPOSITORY https://github.com/kcenon/${PROJECT_NAME}.git
            GIT_TAG        ${GITHUB_REF_NAME}
          )
          \`\`\`
          EOF

          {
            echo
            echo "## Changelog"
            echo
            if [[ -n "$PREVIOUS_TAG" ]]; then
              printf '%s\n' "$CHANGELOG"
            else
              echo "Initial release."
            fi
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ inputs.project-name }} ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
